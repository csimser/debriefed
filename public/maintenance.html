<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debriefed - Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #0a0c0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8eaed;
    }
    
    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }
    
    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #d4a84b;
    }
    
    .icon {
      font-size: 4rem;
      margin-bottom: 30px;
    }
    
    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      margin-bottom: 20px;
      color: #e8eaed;
      font-weight: 600;
    }
    
    p {
      font-size: 1.1rem;
      color: #8b919e;
      line-height: 1.6;
      margin-bottom: 15px;
    }
    
    .timeframe {
      display: inline-block;
      background: rgba(212, 168, 75, 0.12);
      border: 1px solid #d4a84b;
      padding: 12px 24px;
      border-radius: 8px;
      margin: 20px 0;
      font-size: 1.2rem;
      color: #d4a84b;
      font-weight: 600;
    }
    
    .card {
      background: #1a1f2a;
      border: 1px solid #2a3040;
      border-radius: 12px;
      padding: 30px;
      margin-top: 30px;
    }
    
    .contact {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid #2a3040;
    }
    
    .contact p {
      font-size: 0.95rem;
      margin-bottom: 15px;
    }
    
    .discord-btn {
      display: inline-block;
      background: #d4a84b;
      color: #0a0c0f;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    
    .discord-btn:hover {
      background: #e4bc5e;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">DEBRIEFED</div>
    
    <div class="card">
      <div class="icon">🔧</div>
      <h1>Down for Maintenance</h1>
      <p>We're making some improvements to give you a better experience.</p>
      <div class="timeframe">Back within 48-72 hours</div>
      <p>Thanks for your patience. We'll be back up shortly with some great updates.</p>
      
      <div class="contact">
        <p>Questions? Join our Discord for updates:</p>
        <a href="https://discord.gg/w53emUMt" class="discord-btn">Join Discord</a>
      </div>
    </div>
  </div>
</body>
</html>
